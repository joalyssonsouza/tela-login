<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tela de Login</title>

    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="mediaqueries.css">
</head>
<body>
    <div class="container">
        <div class="login-box">
            <h2>Login</h2>

            <p class="subtitle">
                Bem-vindo de volta! Entre com seus dados para continuar sua experiência.
            </p>

            <form>
                <div class="input-box">
                    <span class="icon">👤</span>
                    <input type="email" name="email" placeholder="Email" required maxlength="30">
                </div>

                <div class="input-box">
                    <span class="icon">🔒</span>
                    <input type="password" name="senha" placeholder="Senha" required minlength="6" maxlength="20">
                </div>

                <p class="forgot-password">Esqueceu a senha?</p>

                <button type="submit">Entrar</button>
            </form>
        </div>
    </div>
</body>
</html>
